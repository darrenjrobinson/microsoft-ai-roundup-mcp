name: Weekly Database Update

on:
  schedule:
    # Tuesdays at 09:00 UTC — the morning after msai.ms's common Monday publish.
    # Publish day has been irregular; move to '0 9 * * 2,5' if it stays noisy.
    - cron: '0 9 * * 2'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Ingestion mode'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  update-database:
    name: Ingest & Publish Updated Database
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      - name: Build TypeScript
        run: npm run build

      # -----------------------------------------------------------------------
      - name: Download latest database from GitHub Releases
        id: download_db
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking for existing database release..."

          # Use --latest flag (not the string "latest" which is treated as a tag name)
          RELEASE_TAG=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName' \
            2>/dev/null || true)
          echo "Latest release tag: '$RELEASE_TAG'"

          if [ -z "$RELEASE_TAG" ]; then
            echo "No releases found — running full ingest."
            echo "db_existed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Attempting to download microsoft-ai-roundup.db from release '$RELEASE_TAG'..."
            if gh release download "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --pattern "microsoft-ai-roundup.db" \
              --output microsoft-ai-roundup.db \
              2>&1; then
              echo "db_existed=true" >> "$GITHUB_OUTPUT"
              ls -lh microsoft-ai-roundup.db
            else
              echo "Asset microsoft-ai-roundup.db not found in release '$RELEASE_TAG' — running full ingest."
              echo "db_existed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # -----------------------------------------------------------------------
      - name: Determine ingestion mode
        id: mode
        run: |
          INPUT_MODE="${{ github.event.inputs.mode || 'incremental' }}"
          DB_EXISTED="${{ steps.download_db.outputs.db_existed }}"

          if [ "$DB_EXISTED" = "false" ] || [ "$INPUT_MODE" = "full" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "Mode: full ingest"
          else
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
            echo "Mode: incremental ingest"
          fi

      # -----------------------------------------------------------------------
      - name: Run ingestion pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INGEST_DB_PATH: ./microsoft-ai-roundup.db
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          if [ "$MODE" = "incremental" ]; then
            node dist/scripts/ingest.js --incremental
          else
            # Full mode must rebuild from scratch — the ingest skips re-embedding
            # issues whose chunks already exist, so a downloaded DB would survive.
            rm -f ./microsoft-ai-roundup.db
            node dist/scripts/ingest.js
          fi

      # -----------------------------------------------------------------------
      - name: Verify database
        run: |
          if [ ! -f ./microsoft-ai-roundup.db ]; then
            echo "ERROR: Database file not found after ingestion!"
            exit 1
          fi
          ls -lh ./microsoft-ai-roundup.db

          # Basic sanity check using sqlite3
          ISSUE_COUNT=$(sqlite3 ./microsoft-ai-roundup.db "SELECT value FROM meta WHERE key='issue_count';" 2>/dev/null || echo "0")
          CHUNK_COUNT=$(sqlite3 ./microsoft-ai-roundup.db "SELECT COUNT(*) FROM chunks;" 2>/dev/null || echo "0")
          echo "Issues: $ISSUE_COUNT"
          echo "Chunks: $CHUNK_COUNT"
          echo "issue_count=$ISSUE_COUNT" >> "$GITHUB_ENV"
          echo "chunk_count=$CHUNK_COUNT" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      - name: Determine release tag
        id: tag
        run: |
          DATE=$(date -u +%Y.%m.%d)
          RUN=$(echo "${{ github.run_number }}" | xargs printf "%04d")
          TAG="db-${DATE}-${RUN}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      # -----------------------------------------------------------------------
      - name: Create GitHub Release with updated database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          NOTES=$(cat <<EOF
          ## Microsoft AI Roundup Database Update

          **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **Mode:** ${{ steps.mode.outputs.mode }}
          **Issues indexed:** ${{ env.issue_count }}
          **Chunks:** ${{ env.chunk_count }}

          ### Usage

          This database is automatically downloaded by the \`microsoft-ai-roundup-mcp\` NPX package on first run.
          No manual steps required.

          To use manually:
          \`\`\`bash
          npx microsoft-ai-roundup-mcp
          \`\`\`
          EOF
          )

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Database Update $TAG" \
            --notes "$NOTES" \
            --latest \
            ./microsoft-ai-roundup.db

          echo "Released: $TAG"

      # -----------------------------------------------------------------------
      - name: Summary
        run: |
          echo "### Database Update Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | ${{ steps.tag.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | ${{ steps.mode.outputs.mode }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Issues indexed | ${{ env.issue_count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Chunks | ${{ env.chunk_count }} |" >> "$GITHUB_STEP_SUMMARY"
          ls -lh microsoft-ai-roundup.db | awk '{print "| DB size | " $5 " |"}' >> "$GITHUB_STEP_SUMMARY"
